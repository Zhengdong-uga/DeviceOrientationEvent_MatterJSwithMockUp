<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Bubble Breakdown — Optimized Physics</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #E8E8E8; 
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 24px;
    color: #1a1a1a;
  }

  .frame {
    width: 360px;
    height: 320px;
    background: #EAE8E1; 
    border-radius: 36px; 
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.06);

    /* 强制圆角裁剪 */
    -webkit-mask-image: -webkit-radial-gradient(white, black);
    mask-image: -webkit-radial-gradient(white, black);
    transform: translateZ(0); 
  }

  /* 顶部 UI */
  .header {
    position: absolute;
    top: 20px;
    left: 20px;
    right: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
    pointer-events: none;
  }

  .badge-items {
    background: #4B4C3A; 
    color: #FFFFFF;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
  }

  .badge-week {
    background: #FFFFFF;
    padding: 6px 12px 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .canvas-wrap {
    width: 100%;
    height: 100%;
    position: relative;
  }
  .canvas-wrap canvas { display: block; cursor: grab; opacity: 0; }

  .sprite-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .sprite {
    position: absolute;
    transform-origin: center center;
    will-change: transform;
  }

  .enable-overlay {
    position: absolute;
    inset: 0;
    background: rgba(234, 232, 225, 0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    cursor: pointer;
    border-radius: inherit;
  }
  .enable-overlay.hidden { opacity: 0; pointer-events: none; }
  .enable-pill {
    background: #4B4C3A;
    color: #FFF;
    padding: 12px 24px;
    border-radius: 999px;
    font-weight: 600;
  }

  .hint { font-size: 12px; color: #8a8a8a; display: flex; gap: 14px; align-items: center; }
  .reset { background: #1a1a1a; color: #fff; border: none; border-radius: 999px; padding: 6px 14px; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>

  <div class="frame">
    <div class="header">
      <div class="badge-items">88 ITEMS</div>
      <div class="badge-week">Week <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></div>
    </div>

    <div class="canvas-wrap" id="canvas-container">
      <div class="sprite-layer" id="spriteLayer"></div>
      <div class="enable-overlay hidden" id="enableOverlay">
        <div class="enable-pill">点击启用物理效果</div>
      </div>
    </div>
  </div>

  <div class="hint">
    <span>点击 Plastic 分裂 · 随机角度下落</span>
    <button class="reset" id="reset">Reset</button>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
  // 文件路径
  const PLASTIC_URL = "./Plastic.svg";
  const GLASS_URL   = "./Glass.svg";
  const METAL_URL   = "./Metal.svg";
  const PET_URL     = "./PET.svg"; 
  const HDPE_URL    = "./HDPE.svg";
  const GLASS2_URL  = "./Glass2.svg";
  const METAL2_URL  = "./Metal2.svg";

  const { Engine, Render, Runner, Bodies, Body, Composite, Mouse, MouseConstraint, Events } = Matter;

  const W = 360; 
  const H = 320; 
  const container = document.getElementById('canvas-container');
  const spriteLayer = document.getElementById('spriteLayer');

  let engine, render, runner, bubbles = [];
  const targetGravity = { x: 0, y: 0.9 };
  let prevAg = null;
  let lastShakeTime = 0;
  let isSplit = false;

  // 【核心修改】添加了 vScale (视觉缩放倍率)
  // 物理碰撞盒 (w, h) 稍微做小，视觉图片 (vScale: 1.15 即放大 15%) 画大，就能完美吃掉瓶颈周围的间隙！
  const initialBubbleConfigs = [
    { label: 'Plastic', texture: PLASTIC_URL, w: 100, h: 180, vScale: 1.15, drop: { x: W * 0.65, y: -200 } },
    { label: 'Glass', texture: GLASS_URL, w: 75, h: 145, vScale: 1.15, drop: { x: W * 0.3, y: -360 } },
    { label: 'Metal', texture: METAL_URL, w: 65, h: 100, vScale: 1.12, drop: { x: W * 0.5, y: -500 } },
  ];

  function createBubbleBody(cfg, x, y) {
    const randomAngle = Math.random() * Math.PI * 2;

    const body = Bodies.rectangle(x, y, cfg.w, cfg.h, {
      angle: randomAngle,
      chamfer: { radius: Math.min(cfg.w, cfg.h) / 2.5 }, // 动态圆角，更加贴合胶囊形状
      restitution: 0.35,
      friction: 0.1,
      frictionAir: 0.015,
      density: 0.005,
      render: { visible: false } // 如果你想看隐藏的物理边界，可以改成 true 试试
    });
    
    body.bubbleConfig = cfg;
    body.spriteId = 's_' + Math.random().toString(36).substr(2, 9);

    const img = document.createElement('img');
    img.className = 'sprite';
    img.id = body.spriteId;
    img.src = cfg.texture;
    
    // 渲染尺寸 = 物理尺寸 * vScale，视觉上“膨胀”一点覆盖间隙
    img.style.width = ((cfg.w * cfg.vScale) / W) * 100 + '%';
    img.style.height = ((cfg.h * cfg.vScale) / H) * 100 + '%';
    
    spriteLayer.appendChild(img);
    return body;
  }

  function splitPlastic(plasticBody) {
    if (isSplit) return;
    isSplit = true;
    const pos = { ...plasticBody.position };
    
    Composite.remove(engine.world, plasticBody);
    bubbles = bubbles.filter(b => b !== plasticBody);
    document.getElementById(plasticBody.spriteId)?.remove();

    // 分裂后的新瓶子同样适用 vScale 规则
    const petBody  = createBubbleBody({ label: 'PET', texture: PET_URL, w: 75, h: 140, vScale: 1.15 }, pos.x - 25, pos.y);
    const hdpeBody = createBubbleBody({ label: 'HDPE', texture: HDPE_URL, w: 75, h: 140, vScale: 1.15 }, pos.x + 25, pos.y);

    Body.setVelocity(petBody,  { x: -4, y: -5 });
    Body.setVelocity(hdpeBody, { x: 4,  y: -5 });

    bubbles.push(petBody, hdpeBody);
    Composite.add(engine.world, [petBody, hdpeBody]);

    bubbles.forEach(body => {
      const el = document.getElementById(body.spriteId);
      if (body.bubbleConfig.label === 'Glass') el.src = GLASS2_URL;
      else if (body.bubbleConfig.label === 'Metal') el.src = METAL2_URL;
    });
  }

  function handleMotion(e) {
    const ag = e.accelerationIncludingGravity;
    if (!ag || ag.x == null) return;
    targetGravity.x = Math.max(-3.5, Math.min(3.5, ag.x * 0.22));
    targetGravity.y = Math.max(-3.5, Math.min(3.5, -ag.y * 0.22));
    
    if (prevAg && bubbles.length) {
      const dx = ag.x - prevAg.x, dy = ag.y - prevAg.y;
      if (Math.sqrt(dx*dx + dy*dy) > 8 && performance.now() - lastShakeTime > 40) {
        bubbles.forEach(body => Body.applyForce(body, body.position, { x: dx * 0.002, y: -dy * 0.002 }));
        lastShakeTime = performance.now();
      }
    }
    prevAg = { x: ag.x, y: ag.y, z: ag.z };
  }

  function init() {
    if (engine) { Render.stop(render); Runner.stop(runner); Composite.clear(engine.world); Engine.clear(engine); render.canvas.remove(); }
    isSplit = false; spriteLayer.innerHTML = ''; bubbles = [];

    engine = Engine.create({ positionIterations: 12, velocityIterations: 10 });
    render = Render.create({ element: container, engine: engine, options: { width: W, height: H, wireframes: false, background: 'transparent', pixelRatio: window.devicePixelRatio || 1 } });

    const wallOpts = { isStatic: true, render: { visible: false }, friction: 0.3 };
    Composite.add(engine.world, [
      Bodies.rectangle(W/2, H+50, W+200, 100, wallOpts),
      Bodies.rectangle(-50, H/2, 100, H+200, wallOpts),
      Bodies.rectangle(W+50, H/2, 100, H+200, wallOpts),
      Bodies.rectangle(W/2, -50, W+200, 100, { isStatic: true, render: { visible: false }, collisionFilter: { mask: 0x0000 } })
    ]);

    bubbles = initialBubbleConfigs.map(cfg => createBubbleBody(cfg, cfg.drop.x, cfg.drop.y));
    Composite.add(engine.world, bubbles);

    const mouseConstraint = MouseConstraint.create(engine, { mouse: Mouse.create(render.canvas), constraint: { stiffness: 0.1, render: { visible: false } } });
    Composite.add(engine.world, mouseConstraint);

    Events.on(mouseConstraint, 'mousedown', (e) => {
      const clicked = Matter.Query.point(bubbles, e.mouse.position);
      if (clicked.length && clicked[0].bubbleConfig.label === 'Plastic') splitPlastic(clicked[0]);
    });

    Events.on(engine, 'beforeUpdate', () => {
      engine.gravity.x += (targetGravity.x - engine.gravity.x) * 0.2;
      engine.gravity.y += (targetGravity.y - engine.gravity.y) * 0.2;
      bubbles.forEach(body => {
        if (!body.hasEntered && body.position.y > 0) body.hasEntered = true;
        if (body.hasEntered) {
            const {x, y} = body.position;
            if (x < 20) Body.setPosition(body, {x: 20, y});
            if (x > W-20) Body.setPosition(body, {x: W-20, y});
        }
      });
    });

    Events.on(render, 'afterRender', () => {
      bubbles.forEach(body => {
        const el = document.getElementById(body.spriteId);
        if (el) {
          el.style.left = (body.position.x / W) * 100 + '%';
          el.style.top  = (body.position.y / H) * 100 + '%';
          el.style.transform = `translate(-50%, -50%) rotate(${body.angle}rad)`;
        }
      });
    });

    Render.run(render);
    runner = Runner.create();
    Runner.run(runner, engine);
  }

  init();
  document.getElementById('reset').addEventListener('click', init);

  const overlay = document.getElementById('enableOverlay');
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    overlay.classList.remove('hidden');
    overlay.addEventListener('click', async () => {
      if (await DeviceMotionEvent.requestPermission() === 'granted') {
        window.addEventListener('devicemotion', handleMotion);
        overlay.classList.add('hidden');
      }
    });
  } else { window.addEventListener('devicemotion', handleMotion); }
</script>
</body>
</html>
